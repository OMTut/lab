apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: weight-tracker-cert
  namespace: weight-tracker
spec:
  secretName: weight-tracker-tls
  issuerRef:
    name: internal-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - heavydeets.tut
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    size: 2048
