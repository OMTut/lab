apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: mealie-public
  namespace: mealie
spec:
  entryPoints:
    - web-public
  tls:
    secretName: mealie-public-tls
    domains:
      - main: mealie.hondo-dev.com
  routes:
    - match: Host(`mealie.hondo-dev.com`)
      kind: Rule
      middlewares:
        - name: public-whitelist
          namespace: kube-system
      services:
        - name: mealie-service
          port: 9000
